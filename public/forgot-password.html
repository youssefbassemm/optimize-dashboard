<!DOCTYPE html>
<!-- AUTH_FRONTEND — forgot-password -->
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Reset Password — Optimize</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0A0A0A;
      --surf:    rgba(255,255,255,0.04);
      --surf-hi: rgba(255,255,255,0.07);
      --line:    rgba(255,255,255,0.08);
      --line-hi: rgba(255,255,255,0.15);
      --t1:      #F0F0F0;
      --t2:      #888888;
      --t3:      #555555;
      --gold:    #D4D4D4;
      --red:     #BF6060;
      --green:   #5C9068;
      --sans:    'DM Sans', sans-serif;
      --serif:   'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--t1);
      font-family: var(--sans);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    .shell {
      width: 100%;
      max-width: 320px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wordmark {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--t3);
      text-align: center;
      margin-bottom: 48px;
    }

    .heading {
      font-family: var(--serif);
      font-size: 24px;
      font-weight: 400;
      color: var(--t1);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .sub {
      font-size: 12px;
      font-weight: 300;
      color: var(--t3);
      line-height: 1.65;
      margin-bottom: 32px;
    }

    /* ── Error / success ── */
    .banner {
      font-size: 12px;
      border-radius: 8px;
      padding: 10px 13px;
      margin-bottom: 18px;
      display: none;
      line-height: 1.55;
    }
    .banner.err  { color: var(--red);   background: rgba(191,96,96,0.07);  border: 1px solid rgba(191,96,96,0.15);  }
    .banner.ok   { color: var(--green); background: rgba(92,144,104,0.07); border: 1px solid rgba(92,144,104,0.15); }
    .banner.show { display: block; }

    /* ── Field ── */
    .fg { margin-bottom: 18px; }

    .fg label {
      display: block;
      font-size: 10.5px;
      font-weight: 500;
      letter-spacing: 0.07em;
      color: var(--t2);
      margin-bottom: 6px;
      transition: color 180ms;
    }
    .fg:focus-within label { color: var(--t1); }

    input[type="email"] {
      width: 100%;
      background: var(--surf);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      font-family: var(--sans);
      font-size: 13px;
      color: var(--t1);
      outline: none;
      transition: border-color 180ms, background 180ms;
      -webkit-appearance: none;
    }
    input::placeholder { color: var(--t3); }
    input:focus { border-color: rgba(212,212,212,0.4); background: var(--surf-hi); }

    /* ── Button ── */
    .btn {
      width: 100%;
      background: var(--t1);
      color: #0A0A0A;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      transition: opacity 160ms, transform 100ms;
    }
    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { opacity: 0.78; transform: none; }
    .btn:disabled { opacity: 0.32; cursor: not-allowed; transform: none; }

    .btn .label { transition: opacity 150ms; }
    .btn .spin {
      display: none;
      width: 13px; height: 13px;
      border: 1.5px solid rgba(10,10,10,0.2);
      border-top-color: #0A0A0A;
      border-radius: 50%;
      animation: spin 0.5s linear infinite;
    }
    .btn.loading .label { display: none; }
    .btn.loading .spin  { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .rule { height: 1px; background: var(--line); margin: 24px 0; }

    .foot {
      text-align: center;
      font-size: 12px;
      font-weight: 300;
      color: var(--t3);
    }
    .foot a {
      color: var(--t2);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 150ms, border-color 150ms;
    }
    .foot a:hover { color: var(--t1); border-color: rgba(255,255,255,0.2); }

    /* ── Atmosphere ──────────────────────────────────────────── */
    .shell { position: relative; z-index: 1; }
    .bg-fx { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .bg-orb { position: absolute; border-radius: 50%; filter: blur(100px); }
    .bg-orb-1 {
      width: 650px; height: 500px;
      background: radial-gradient(circle, rgba(212,212,212,0.06) 0%, transparent 70%);
      top: -180px; right: -80px;
      animation: o1 34s ease-in-out infinite alternate;
    }
    .bg-orb-2 {
      width: 600px; height: 680px;
      background: radial-gradient(circle, rgba(255,255,255,0.012) 0%, transparent 70%);
      bottom: -200px; left: -100px;
      animation: o2 46s ease-in-out infinite alternate;
    }
    .bg-orb-3 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(212,212,212,0.025) 0%, transparent 70%);
      top: 48%; left: 38%;
      animation: o3 29s ease-in-out infinite alternate;
    }
    @keyframes o1 { from { transform: translate(0,0) scale(1); } to { transform: translate(-90px,110px) scale(1.2); } }
    @keyframes o2 { from { transform: translate(0,0) scale(1); } to { transform: translate(110px,-80px) scale(0.82); } }
    @keyframes o3 { from { transform: translate(0,0) scale(0.88); } to { transform: translate(-70px,-90px) scale(1.22); } }
    .bg-noise {
      position: fixed; inset: 0; z-index: 2; pointer-events: none; opacity: 0.032;
      background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='256' height='256'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='256' height='256' filter='url(%23n)'/></svg>");
      background-size: 190px;
    }
    .bg-vignette {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
      background: radial-gradient(ellipse 110% 110% at 50% 50%, transparent 30%, rgba(0,0,0,0.62) 100%);
    }
    .cursor-glow {
      position: fixed; width: 520px; height: 520px; border-radius: 50%;
      background: radial-gradient(circle, rgba(212,212,212,0.04) 0%, transparent 65%);
      mix-blend-mode: screen;
      transform: translate(-50%,-50%); left: 50%; top: 40%;
      pointer-events: none;
      transition: left 1.3s cubic-bezier(0.16,1,0.3,1), top 1.3s cubic-bezier(0.16,1,0.3,1);
      z-index: 10;
    }
  </style>
</head>
<body>
<div class="bg-fx" aria-hidden="true"><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div><div class="bg-orb bg-orb-3"></div></div>
<div class="bg-noise" aria-hidden="true"></div>
<div class="bg-vignette" aria-hidden="true"></div>
<div class="cursor-glow" id="cursor-glow" aria-hidden="true"></div>
<div class="shell">
  <div class="wordmark">Optimize</div>

  <div class="heading">Reset your password</div>
  <div class="sub">Enter your email and we'll send you a link to set a new password.</div>

  <div class="banner err" id="err"></div>
  <div class="banner ok"  id="ok"></div>

  <form id="f" novalidate>
    <div class="fg">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@yourbrand.com" autocomplete="email"/>
    </div>
    <button class="btn" id="btn" type="submit">
      <span class="label">Send reset link</span>
      <div class="spin"></div>
    </button>
  </form>

  <div class="rule"></div>
  <div class="foot"><a href="/signin">← Back to sign in</a></div>
</div>

<script>
(function(){var g=document.getElementById('cursor-glow');if(!g)return;document.addEventListener('mousemove',function(e){g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';});})();

(function () {
  'use strict';

  const form   = document.getElementById('f');
  const errEl  = document.getElementById('err');
  const okEl   = document.getElementById('ok');
  const btn    = document.getElementById('btn');
  const emailIn = document.getElementById('email');

  function showErr(msg) {
    errEl.textContent = msg; errEl.classList.add('show');
    okEl.classList.remove('show');
  }
  function showOk(msg) {
    okEl.textContent = msg; okEl.classList.add('show');
    errEl.classList.remove('show');
    form.style.display = 'none';
  }
  function hideAll() {
    errEl.classList.remove('show');
    okEl.classList.remove('show');
  }

  emailIn.addEventListener('focus', hideAll);

  form.addEventListener('submit', async e => {
    e.preventDefault();
    hideAll();

    const email = emailIn.value.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showErr('Please enter a valid email address.');
      return;
    }

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res  = await fetch('/api/auth/forgot-password', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email }),
      });
      const data = await res.json().catch(() => ({}));

      if (data._dev_reset_url) {
        // Dev mode — show the link directly so it can be tested
        showOk('Development mode: ' + data._dev_reset_url);
      } else {
        showOk('Check your inbox — if that email exists you\'ll receive a reset link shortly.');
      }
    } catch (_) {
      showErr('Cannot reach server. Please try again.');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  });
})();
</script>
</body>
</html>
